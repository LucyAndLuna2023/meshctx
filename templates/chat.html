<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>meshctx Chat</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #e6edf3; --muted: #8b949e; --accent: #58a6ff;
  --user-bg: #1f6feb22; --ai-bg: #161b22;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg); color: var(--text); height: 100vh;
  display: flex; flex-direction: column;
}
.header {
  padding: 12px 20px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}
.header h1 { font-size: 16px; font-weight: 600; }
.header select, .header button {
  background: var(--bg); color: var(--text); border: 1px solid var(--border);
  padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
}
.header select:hover, .header button:hover { border-color: var(--accent); }
.messages {
  flex: 1; overflow-y: auto; padding: 20px;
  display: flex; flex-direction: column; gap: 16px;
}
.msg { display: flex; gap: 12px; max-width: 85%; animation: fadeIn .3s; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .avatar {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; flex-shrink: 0;
}
.msg.ai .avatar { background: #1f6feb; }
.msg.user .avatar { background: #238636; }
.msg .bubble {
  padding: 10px 14px; border-radius: 12px;
  line-height: 1.5; font-size: 14px; white-space: pre-wrap;
  word-break: break-word;
}
.msg.ai .bubble { background: var(--ai-bg); border: 1px solid var(--border); }
.msg.user .bubble { background: var(--user-bg); border: 1px solid #1f6feb44; }
.msg .tool-result {
  margin-top: 8px; padding: 8px 10px; background: #0d1117;
  border: 1px solid #30363d; border-radius: 6px;
  font-size: 12px; color: var(--muted); max-height: 200px; overflow-y: auto;
  font-family: monospace;
}
.input-area {
  padding: 16px 20px; background: var(--surface);
  border-top: 1px solid var(--border); display: flex; gap: 8px;
}
.input-area textarea {
  flex: 1; background: var(--bg); color: var(--text);
  border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 14px; font-size: 14px; resize: none;
  font-family: inherit; min-height: 44px; max-height: 150px;
}
.input-area textarea:focus { outline: none; border-color: var(--accent); }
.input-area button {
  background: var(--accent); color: #fff; border: none;
  padding: 10px 20px; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 600;
}
.input-area button:hover { opacity: 0.9; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
.info-bar {
  padding: 6px 20px; background: var(--surface);
  border-top: 1px solid var(--border); font-size: 12px;
  color: var(--muted); display: flex; gap: 16px;
}
.typing { color: var(--muted); font-style: italic; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }
</style>
</head>
<body>
<div class="header">
  <h1>🕸 meshctx Chat</h1>
  <select id="modelSelect" onchange="switchModel()">
    <option value="deepseek:v4-pro">🏆 V4-Pro</option>
    <option value="deepseek:v4-flash" selected>⚡ V4-Flash</option>
    <option value="deepseek:chat">V3 Chat</option>
    <option value="deepseek:reasoner">🧠 R1</option>
  </select>
  <button onclick="newChat()">➕ 新对话</button>
  <span style="flex:1"></span>
  <a href="/ui/" style="color:var(--muted);text-decoration:none;font-size:13px">← 控制台</a>
</div>
<div class="messages" id="messages">
  <div class="msg ai">
    <div class="avatar">🤖</div>
    <div class="bubble">你好！我是 meshctx。我可以读文件、搜代码、执行命令。<br>试试问我：读一下 README.md</div>
  </div>
</div>
<div class="input-area">
  <textarea id="input" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</div>
<div class="info-bar">
  <span id="modelInfo">模型: deepseek:v4-flash</span>
  <span id="hybridMode" style="color:var(--accent)">🧠 直出</span>
  <span id="freeEnergy" style="color:var(--muted)"></span>
  <span id="tokenCount"></span>
</div>

<script>
let messages = [];
let model = 'deepseek:v4-flash';
let currentHybridInfo = null;

function addMsg(role, content, isTool) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="avatar">${role==='user'?'👤':'🤖'}</div>
    <div>
      <div class="bubble">${escapeHtml(content)}</div>
      ${isTool ? `<div class="tool-result">🔧 ${escapeHtml(isTool)}</div>` : ''}
    </div>`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  
  addMsg('user', text);
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('sendBtn').disabled = true;
  
  messages.push({role:'user', content:text});
  
  // Typing indicator
  const typingDiv = document.createElement('div');
  typingDiv.className = 'msg ai typing-msg';
  typingDiv.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing">思考中...</div>';
  document.getElementById('messages').appendChild(typingDiv);
  
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({messages, model})
    });
    const data = await resp.json();
    
    typingDiv.remove();
    addMsg('ai', data.content, data.tool_result);
    messages.push({role:'assistant', content:data.content});
    
    document.getElementById('tokenCount').textContent = 
      `Tokens: ${data.tokens || 0}`;
    
    // v1.5.26: 更新混合推理状态指示器
    if (data.hybrid_info) {
      currentHybridInfo = data.hybrid_info;
      document.getElementById('hybridMode').textContent = 
        data.hybrid_info.strategy === 'explore' ? '🧭 探索' : '⚡ 直出';
      document.getElementById('freeEnergy').textContent = 
        `F=${data.hybrid_info.free_energy.toFixed(3)} | ${data.hybrid_info.policy}`;
    } else if (data.content && !data.hybrid_info) {
      // direct mode — 没有 hybrid_info 时也从直出模式推断
      document.getElementById('hybridMode').textContent = '⚡ 直出';
      document.getElementById('freeEnergy').textContent = '';
    }
  } catch(e) {
    typingDiv.remove();
    addMsg('ai', '错误: ' + e.message);
  }
  
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function switchModel() {
  model = document.getElementById('modelSelect').value;
  document.getElementById('modelInfo').textContent = `模型: ${model}`;
}

function newChat() {
  messages = [];
  document.getElementById('messages').innerHTML = '';
  addMsg('ai', '新对话开始。有什么可以帮你的？');
}
</script>
</body>
</html>
