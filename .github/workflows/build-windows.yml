name: Build Windows Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths:
      - 'src/**'
      - 'meshctx_desktop.py'
      - 'meshctx_desktop.spec'
      - 'meshctx_setup.nsi'
      - 'version_info.txt'
      - 'requirements.txt'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pycryptodome pywebview

      - name: Generate logo icons
        run: |
          python -c "
          import struct
          # Create a simple 32x32 blue square .ico
          w, h = 32, 32
          pixels = bytes([0,85,255] * w * h)
          bmp = b'BM' + struct.pack('<I', 54 + len(pixels)) + b'\x00\x00\x00\x00\x36\x00\x00\x00\x28\x00\x00\x00' + struct.pack('<II', w, h) + b'\x01\x00\x18\x00\x00\x00\x00\x00' + struct.pack('<I', len(pixels)) + b'\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00\x00' + pixels
          ico_header = b'\x00\x00\x01\x00\x01\x00'
          entry = struct.pack('BBBBHHII', w, h, 0, 0, 1, 24, len(ico_header) + 16, len(bmp))
          with open('logo.ico', 'wb') as f: f.write(ico_header + entry + bmp)
          import shutil; shutil.copy('logo.ico', 'logo.png')
          print('logo.ico and logo.png created')
          "

      - name: Build Desktop .exe
        run: pyinstaller meshctx_desktop.spec

      - name: Verify build
        run: |
          if (Test-Path dist\meshctx-desktop.exe) {
            Write-Host "OK: meshctx-desktop.exe"
            Get-Item dist\meshctx-desktop.exe | Select-Object Name, Length
          } else {
            Write-Host "FAIL: .exe not found"
            exit 1
          }

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" meshctx_setup.nsi
          if (Test-Path dist\meshctx-setup.exe) {
            Get-Item dist\meshctx-setup.exe | Select-Object Name, Length
          } else {
            Write-Host "WARN: NSIS build may have failed, continuing..."
          }

      - name: Package portable
        run: |
          copy dist\meshctx-desktop.exe dist\meshctx.exe
          copy README.md dist\
          Compress-Archive -Path dist\meshctx.exe,dist\README.md -DestinationPath meshctx-portable.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meshctx.exe
            dist/meshctx-setup.exe
            meshctx-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
