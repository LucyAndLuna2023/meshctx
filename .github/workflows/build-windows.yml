name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pycryptodome pywebview

      - name: Build Desktop .exe
        run: pyinstaller meshctx_desktop.spec

      - name: Verify build
        run: |
          if (Test-Path dist\meshctx-desktop.exe) {
            Write-Host "OK: meshctx-desktop.exe"
            Get-Item dist\meshctx-desktop.exe | Select-Object Name, Length
          } else {
            Write-Host "FAIL"
            exit 1
          }

      - name: Package
        run: |
          copy README.md dist\
          copy dist\meshctx-desktop.exe dist\meshctx.exe
          Compress-Archive -Path dist\meshctx.exe,dist\README.md -DestinationPath meshctx-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meshctx.exe
            dist/meshctx-desktop.exe
            meshctx-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
