name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pycryptodome pywebview

      - name: Build Desktop .exe
        run: pyinstaller meshctx_desktop.spec

      - name: Verify build
        run: |
          if (Test-Path dist\meshctx-desktop.exe) {
            Write-Host "OK: meshctx-desktop.exe"
            Get-Item dist\meshctx-desktop.exe | Select-Object Name, Length
          } else {
            Write-Host "FAIL: .exe not found"
            exit 1
          }

      - name: Install NSIS
        run: |
          choco install nsis -y --no-progress
          echo "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" meshctx_setup.nsi
          if (Test-Path dist\meshctx-setup.exe) {
            Get-Item dist\meshctx-setup.exe | Select-Object Name, Length
          } else {
            Write-Host "WARN: NSIS build may have failed, continuing..."
          }

      - name: Package portable
        run: |
          copy dist\meshctx-desktop.exe dist\meshctx.exe
          copy README.md dist\
          Compress-Archive -Path dist\meshctx.exe,dist\README.md -DestinationPath meshctx-portable.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meshctx.exe
            dist/meshctx-setup.exe
            meshctx-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
