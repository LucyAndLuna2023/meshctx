name: Build Windows Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pywebview

      - name: Build executable (使用修复后的spec — 解决parent package问题)
        run: |
          pyinstaller meshctx.spec

      - name: Verify build
        run: |
          if (Test-Path dist\meshctx.exe) {
            Write-Host "✅ meshctx.exe built successfully"
            Get-Item dist\meshctx.exe | Select-Object Name, Length, LastWriteTime
          } else {
            Write-Host "❌ meshctx.exe not found!"
            exit 1
          }

      - name: Package release
        run: |
          copy README.md dist\
          Compress-Archive -Path dist\meshctx.exe,dist\README.md -DestinationPath meshctx-windows.zip

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meshctx.exe
            meshctx-windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
