name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pyyaml numpy requests python-multipart aiofiles jinja2 websockets cryptography

    - name: Test import (framework only, no brain modules)
      run: |
        python -c "from src.core import __version__; print('Version:', __version__)"
        python -c "from src.core import get_kernel, EventBus; print('Kernel OK')"

    - name: Test with pytest (skip brain tests)
      run: |
        pytest tests/ -v --tb=short -k "not brain and not super_brain and not test_v19" \
          --ignore=tests/ui/ --ignore=tests/run_e2e_test.py \
          -o 'addopts=' 2>&1 | tail -20

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t meshctx .

    - name: Test Docker image
      run: |
        docker run -d -p 3000:3000 --name meshctx-test meshctx
        sleep 10
        curl -fs http://localhost:3000/api/version
        docker stop meshctx-test
