name: Build macOS Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller pycryptodome pywebview

      - name: Build macOS .app using spec
        run: |
          bash scripts/build-mac.sh

      - name: Verify build
        run: |
          if [ -d dist/meshctx-desktop.app ]; then
            APP_BINARY="dist/meshctx-desktop.app/Contents/MacOS/meshctx-desktop"
            if [ -f "$APP_BINARY" ]; then
              echo "OK: meshctx-desktop.app built"
              file "$APP_BINARY"
              ls -lh "$APP_BINARY"
            else
              echo "WARN: .app structure found but no binary inside"
              find dist/meshctx-desktop.app -type f
            fi
          else
            echo "dist contents:"
            ls -lh dist/
            # Fallback: check for any .app
          fi

      - name: Package as .dmg
        run: |
          if [ -d dist/meshctx-desktop.app ]; then
            mkdir -p dist/dmg
            cp -r dist/meshctx-desktop.app dist/dmg/
            ln -sf /Applications dist/dmg/Applications
            hdiutil create -volname "meshctx-desktop" -srcfolder dist/dmg -ov -format UDZO dist/meshctx-desktop.dmg
            ls -lh dist/meshctx-desktop.dmg
          else
            echo "Skipping DMG creation: .app not found"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/meshctx-desktop.dmg
            dist/meshctx-desktop.app
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
