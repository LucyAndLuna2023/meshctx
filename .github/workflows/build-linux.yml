name: Build Linux Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-deb:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build tools
      run: |
        pip install pyinstaller

    - name: Build binary
      run: |
        pyinstaller --onefile --name meshctx \
          --add-data "src:src" \
          --add-data "plugins:plugins" \
          --add-data "docs:docs" \
          src/main.py

    - name: Package as .deb
      run: |
        mkdir -p meshctx-deb/DEBIAN
        mkdir -p meshctx-deb/usr/local/bin
        mkdir -p meshctx-deb/usr/share/meshctx
        mkdir -p meshctx-deb/etc/meshctx
        
        cp dist/meshctx meshctx-deb/usr/local/bin/
        cp -r src meshctx-deb/usr/share/meshctx/
        cp -r plugins meshctx-deb/usr/share/meshctx/
        cp meshctx.yaml meshctx-deb/etc/meshctx/config.yaml.example
        
        cat > meshctx-deb/DEBIAN/control << EOF
Package: meshctx
Version: ${GITHUB_REF_NAME#v}
Section: utils
Priority: optional
Architecture: amd64
Maintainer: MeshCtx <jason.liu@meshctx.com>
Description: World's first self-evolving AI agent
 13 brain regions, 100+ models, 28 providers.
 Multi-platform AI agent with web UI, code sandbox,
 and full brain-inspired architecture.
EOF

        cat > meshctx-deb/DEBIAN/postinst << 'DONE'
#!/bin/bash
echo "MeshCtx installed. Run: meshctx --help"
DONE
        chmod 755 meshctx-deb/DEBIAN/postinst
        
        dpkg-deb --build meshctx-deb meshctx_${GITHUB_REF_NAME#v}_amd64.deb

    - name: Upload .deb
      uses: softprops/action-gh-release@v2
      with:
        files: meshctx_*_amd64.deb
