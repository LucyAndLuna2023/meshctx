# MeshCtx docker-compose — One-command deploy
# docker-compose up -d
version: '3.8'

services:
  meshctx:
    build: .
    container_name: meshctx
    ports:
      - "8000:8000"
    volumes:
      # Persistent conversations
      - meshctx_data:/home/meshctx/.meshctx
      # Mount project for file access
      - ${PROJECT_DIR:-~/projects}:/projects:ro
    env_file:
      - .env
    environment:
      - MESHCTX_HOST=0.0.0.0
      - MESHCTX_PORT=8000
      # Model API keys (set in .env or pass through)
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - BAILIAN_API_KEY=${BAILIAN_API_KEY:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meshctx.rule=Host(`meshctx.local`)"

  # Optional: Watchtower for auto-updates
  watchtower:
    image: containrrr/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 meshctx
    profiles:
      - auto-update

volumes:
  meshctx_data:

# ═══════════════════════════════════════════════
# Quick Start:
#   1. echo "DEEPSEEK_API_KEY=sk-xxx" > .env
#   2. echo "BAILIAN_API_KEY=sk-xxx" >> .env
#   3. docker-compose up -d
#   4. Open http://localhost:8000/ui/chat
# ═══════════════════════════════════════════════
